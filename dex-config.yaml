# Dex configuration for Epinio with GitHub + Rancher OIDC
# Use this to create/update the dex-config secret:
#   kubectl delete secret dex-config -n epinio
#   kubectl create secret generic dex-config --from-file=config.yaml=dex-config.yaml -n epinio
#   kubectl rollout restart deployment/dex -n epinio

issuer: https://auth.192.168.1.8.nip.io
web:
  allowedOrigins: ['localhost:8005', 'https://rancher.192.168.49.2.nip.io']
storage:
  type: kubernetes
  config:
    inCluster: true
oauth2:
  skipApprovalScreen: true
enablePasswordDB: true
staticPasswords:
- email: "admin@epinio.io"
  hash: "$2a$10$2b2cU8CPhOTaGrs1HRQuAueS7JTT5ZHsHSzYiFPm1leZck7Mc8T4W"
  username: "admin"
  userID: "08a8684b-db88-4b73-90a9-3cd1661f5466"
- email: "epinio@epinio.io"
  hash: "$2a$10$2b2cU8CPhOTaGrs1HRQuAueS7JTT5ZHsHSzYiFPm1leZck7Mc8T4W"
  userID: "08a8684b-db88-4b73-90a9-3cd1661f5467"

staticClients:
- id: epinio-api
  name: 'Epinio API'
  public: true
  trustedPeers:
  - epinio-cli
  - epinio-ui
  - rancher-dashboard
- id: epinio-cli
  name: 'Epinio cli'
  public: true
- id: epinio-ui
  name: 'Epinio UI'
  secret: "uJfiOAOiK6fjEb3bj66O81I2Pdwsxihf"
  redirectURIs:
  - "https://epinio.192.168.1.8.nip.io/auth/verify/"
  - "https://localhost:8005/auth/verify/"
- id: rancher-dashboard
  name: 'Rancher Dashboard'
  public: true
  redirectURIs:
  - "https://rancher.192.168.49.2.nip.io/dashboard/epinio/auth/verify/"

connectors:
# GitHub OAuth
- type: github
  id: github
  name: GitHub
  config:
    clientID: Ov23liNWK2ljGs6VmXmY
    clientSecret: "232de3b3b26e2ecf4e1718ff4836e8858c82164e"
    redirectURI: https://auth.192.168.1.8.nip.io/callback
    loadAllGroups: false
    teamNameField: slug

# Rancher OIDC - requires PKCE S256 (use dex-pkce image). Issuer = public URL; Dex reaches it via hostAlias -> ClusterIP.
- type: oidc
  id: rancher
  name: Rancher
  config:
    usePKCE: true
    issuer: https://rancher.192.168.49.2.nip.io/oidc
    clientID: client-nhhdjk8579
    clientSecret: secret-rf9hd2pqkqcwgksx4hwp6qbc4j2p5f6vt2r6chsrcmgz892zstwl2qvl
    redirectURI: https://auth.192.168.1.8.nip.io/callback
    insecureSkipVerify: true
    getUserInfo: true
    # Map Rancher's claim names to standard OIDC claims (Rancher may use "username" instead of "name"/"preferred_username")
    userNameKey: username
    claimMapping:
      preferred_username: username
    scopes:
    - openid
    - profile
