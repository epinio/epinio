# This action will be triggered when the 'Product Release' is published.
# It notifies the external repositories about the new Epinio version
name: Release Published

on:
  release:
    types:
      # this will skip the pre-releases
      - released
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to process (e.g. v1.14.0)'
        required: true

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Get current tag
        id: get_tag
        run: echo ::set-output name=TAG::${GITHUB_REF/refs\/tags\//}

      # Automate documentation update related to Epinio releases.
      # The latest tag is sent to the documentation repository.
      - name: epinio/docs Repository Dispatch
        uses: peter-evans/repository-dispatch@v2
        with:
          token: ${{ secrets.CHART_REPO_ACCESS_TOKEN }}
          repository: epinio/docs
          event-type: epinio-release
          client-payload: '{"ref": "${{ steps.get_tag.outputs.TAG }}"}'

      # Automate Docker extension update related to Epinio releases.
      # The latest tag is sent to the extension-docker-desktop repository.
      - name: epinio/extension-docker-desktop Repository Dispatch
        uses: peter-evans/repository-dispatch@v2
        with:
          token: ${{ secrets.CHART_REPO_ACCESS_TOKEN }}
          repository: epinio/extension-docker-desktop
          event-type: epinio-release
          client-payload: '{"ref": "${{ steps.get_tag.outputs.TAG }}"}'

      # Only bump Homebrew formula for release candidates (tags containing "rc")
      - name: Check if release candidate
        id: check_rc
        run: |
          if [[ "${{ steps.get_tag.outputs.TAG }}" == *"rc"* ]]; then
            echo "is_rc=true" >> $GITHUB_OUTPUT
          else
            echo "is_rc=false" >> $GITHUB_OUTPUT
          fi

      - name: Compute release SHA256
        id: sha256
        if: steps.check_rc.outputs.is_rc == 'false'
        env:
          TAG: ${{ github.event.release.tag_name || inputs.tag }}
        run: |
          SHA=$(curl -fsSL "https://github.com/epinio/epinio/archive/refs/tags/${TAG}.tar.gz" |sha256sum | awk '{print $1}')
          echo "value=${SHA}" >> $GITHUB_OUTPUT

      - name: Bump Homebrew formula
        if: steps.check_rc.outputs.is_rc == 'false'
        uses: mislav/bump-homebrew-formula-action@v4
        with:
          tag-name: ${{ github.event.release.tag_name || inputs.tag }}
          download-url: https://github.com/epinio/epinio/archive/refs/tags/${{github.event.release.tag_name || inputs.tag }}.tar.gz
          download-sha256: ${{ steps.sha256.outputs.value }}
          homebrew-tap: epinio/homebrew-tap
          commit-message: |
            {{formulaName}} {{version}}

            Created by https://github.com/mislav/bump-homebrew-formula-action
        env:
          COMMITTER_TOKEN: ${{ secrets.COMMITTER_TOKEN }}

      # - name: Update Upgrade Responder Response JSON config
      #   run: ./scripts/upgrade-responder-release-update.sh
